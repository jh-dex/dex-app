<script>
// GitHub Pages 프로젝트 페이지 배포 경로
// (예: https://<user>.github.io/dex-app)
window.__BASE_PATH__ = "/dex-app";

// GitHub Pages SPA 라우팅: 404.html에서 전달받은 경로 복원
// 앱이 로드되기 전에 실행되어야 함
(function(l) {
  var basePath = (window.__BASE_PATH__ || "").replace(/\/$/, "");
  var normalizedPath = l.pathname.replace(/\/$/, "");
  var basePrefix = basePath && normalizedPath === basePath ? basePath : normalizedPath;

  if (l.search[1] === '/' ) {
    var decoded = l.search.slice(1).split('&').map(function(s) {
      return s.replace(/~and~/g, '&')
    }).join('?');
    window.history.replaceState(null, null,
      (basePrefix || "") + decoded + l.hash
    );
  }
}(window.location))
</script>

<script type="text/babel">

const BASE_PATH = (() => {
  const configuredBase = (window.__BASE_PATH__ || "").replace(/\/$/, "");
  return configuredBase;
})();

function withBasePath(path) {
  const normalizedPath = path.startsWith("/") ? path : `/${path}`;
  return BASE_PATH ? `${BASE_PATH}${normalizedPath}` : normalizedPath;
}

function stripBasePath(pathname) {
  if (!BASE_PATH) return pathname;
  if (pathname === BASE_PATH) return "/";
  if (pathname.startsWith(`${BASE_PATH}/`)) {
    return pathname.slice(BASE_PATH.length);
  }
  return pathname;
}

function normalizeText(value = "") {
  return String(value).trim().toLowerCase().replace(/\s+/g, " ");
}

// ═══════════════════════════════════════════════════════════

// 사진 업로드 (Supabase Storage)
// ═══════════════════════════════════════════════════════════
const STORAGE_BUCKET = "review-photos";
const MAX_PHOTOS_PER_REVIEW = 3;
const MAX_IMAGE_WIDTH = 1400;
const IMAGE_QUALITY = 0.82;
const MAX_UPLOAD_BYTES = 400 * 1024; // 압축 후 개별 파일 400KB 상한

// Canvas 기반 리사이즈 + JPEG 압축 (quality 낮춰가며 크기 목표 맞춤)
function compressImage(file, maxWidth = MAX_IMAGE_WIDTH, quality = IMAGE_QUALITY) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("FILE_READ_FAILED"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("IMAGE_DECODE_FAILED"));
      img.onload = () => {
        const ratio = Math.min(maxWidth / img.width, 1);
        const w = Math.max(1, Math.round(img.width * ratio));
        const h = Math.max(1, Math.round(img.height * ratio));
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        if (!ctx) return reject(new Error("CANVAS_UNSUPPORTED"));
        ctx.drawImage(img, 0, 0, w, h);

        const tryEncode = (q) => new Promise((res, rej) => {
          canvas.toBlob((b) => (b ? res(b) : rej(new Error("BLOB_FAILED"))), "image/jpeg", q);
        });

        (async () => {
          let q = quality;
          let blob = await tryEncode(q);
          // 400KB 넘으면 품질 내려가며 재인코딩 (최소 0.5까지)
          while (blob.size > MAX_UPLOAD_BYTES && q > 0.5) {
            q = Math.max(0.5, q - 0.1);
            blob = await tryEncode(q);
          }
          resolve(blob);
        })().catch(reject);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Supabase Storage에 업로드 후 public URL 반환
async function uploadReviewPhoto(blob) {
  const rand = Math.random().toString(36).slice(2, 10);
  const path = `${Date.now()}-${rand}.jpg`;
  const formData = new FormData();
  formData.append("cacheControl", "3600");
  formData.append("", blob, path);

  const response = await fetch(
    `${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`,
    {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "x-upsert": "true",
      },
      body: formData,
    }
  );
  if (!response.ok) {
    const text = await response.text().catch(() => "");
    console.error("[storage] upload failed", response.status, text);
    throw new Error(`UPLOAD_FAILED:${response.status}:${text.slice(0, 200)}`);
  }
  return `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${path}`;
}

// public URL에서 Storage의 object path만 뽑아 DELETE (실패해도 앱 흐름 막지 않음)
async function deleteReviewPhoto(url) {
  const marker = `/storage/v1/object/public/${STORAGE_BUCKET}/`;
  const idx = url?.indexOf(marker);
  if (idx === undefined || idx === -1) return;
  const path = url.slice(idx + marker.length);
  try {
    await fetch(
      `${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`,
      {
        method: "DELETE",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
      }
    );
  } catch (e) {
    console.warn("Failed to delete storage object:", e);
  }
}

// DB에서 모든 맛집과 리뷰 로드
async function loadFromDB() {
  const restaurants = await supabase.get("restaurants", "order=created_at.desc");
  const reviews = await supabase.get("reviews", "order=created_at.desc");

  return restaurants.map(restaurant => ({
    id: restaurant.id,
    name: restaurant.name,
    address: restaurant.address,
    category: restaurant.category,
    phone: restaurant.phone,
    mapLink: restaurant.map_link,
    reviews: reviews
      .filter(review => review.restaurant_id === restaurant.id)
      .map(review => ({
        id: review.id,
        nickname: review.nickname,
        rating: review.rating,
        comment: review.comment,
        photoUrls: Array.isArray(review.photo_urls) ? review.photo_urls : [],
        createdAt: review.created_at.slice(0, 10)
      }))
  }));
}

// 맛집 DB에 추가
async function addRestaurantToDB(data) {
  const normalizedName = normalizeText(data.name);
  const normalizedAddress = normalizeText(data.address);
  const normalizedMapLink = normalizeText(data.mapLink);

  const existing = await supabase.get("restaurants", "select=id,name,address,map_link");
  const duplicate = existing.find((restaurant) => {
    const sameMapLink = normalizedMapLink && normalizeText(restaurant.map_link) === normalizedMapLink;
    const sameNameAndAddress =
      normalizeText(restaurant.name) === normalizedName &&
      normalizeText(restaurant.address) === normalizedAddress;
    return sameMapLink || sameNameAndAddress;
  });

  if (duplicate) {
    throw new Error("DUPLICATE_RESTAURANT");
  }

  const result = await supabase.post("restaurants", {
    name: data.name,
    address: data.address,
    category: data.category,
    phone: data.phone,
    map_link: data.mapLink
  });
  return result[0];
}

// 리뷰 DB에 추가 (사진 없을 땐 photo_urls 필드 자체를 보내지 않아
// photo_urls 컬럼 마이그레이션 전에도 기존 리뷰 등록이 동작)
async function addReviewToDB(restaurantId, data) {
  const body = {
    restaurant_id: restaurantId,
    nickname: data.nickname,
    rating: data.rating,
    comment: data.comment
  };
  if (data.photoUrls && data.photoUrls.length > 0) {
    body.photo_urls = data.photoUrls;
  }
  const result = await supabase.post("reviews", body);
  return result[0];
}

// 리뷰 DB에서 삭제 (연결된 사진도 Storage에서 정리)
async function deleteReviewFromDB(id) {
  let urls = [];
  try {
    const rows = await supabase.get("reviews", `id=eq.${id}&select=photo_urls`);
    if (Array.isArray(rows) && rows[0]?.photo_urls) urls = rows[0].photo_urls;
  } catch (e) {
    // photo_urls 컬럼 없을 수 있음 — 무시하고 진행
  }
  await supabase.delete("reviews", `id=eq.${id}`);
  await Promise.all(urls.map(deleteReviewPhoto));
}

// 맛집과 관련 리뷰 + 사진 전부 삭제
async function deleteRestaurantFromDB(id) {
  let urls = [];
  try {
    const rows = await supabase.get("reviews", `restaurant_id=eq.${id}&select=photo_urls`);
    if (Array.isArray(rows)) urls = rows.flatMap((r) => r.photo_urls || []);
  } catch (e) {
    // photo_urls 컬럼 없을 수 있음 — 무시
  }
  await supabase.delete("reviews", `restaurant_id=eq.${id}`);
  await supabase.delete("restaurants", `id=eq.${id}`);
  await Promise.all(urls.map(deleteReviewPhoto));
}

const kakaoSearch = (query) => {
  return new Promise((resolve) => {
    // 카카오맵 API가 로드되지 않은 경우
    if (!window.kakao?.maps?.services) {
      resolve([]);
      return;
    }

    const places = new window.kakao.maps.services.Places();

    places.keywordSearch(
      query,
      (data, status) => {
        if (status === window.kakao.maps.services.Status.OK) {
          // 음식점 카테고리만 필터링
          const foodPlaces = data.filter(
            place => place.category_group_code === "FD6" ||
                    place.category_name?.includes("음식점")
          );
          // 음식점이 있으면 음식점만, 없으면 전체 결과 반환
          resolve(foodPlaces.length > 0 ? foodPlaces.slice(0, 8) : data.slice(0, 8));
        } else {
          resolve([]);
        }
      },
      {
        category_group_code: "FD6", // 음식점 카테고리 코드
        size: 10,
        x: CENTER_COORDS.longitude, // 중심 경도
        y: CENTER_COORDS.latitude,  // 중심 위도
        radius: CENTER_COORDS.radius // 반경 1km
      }
    );
  });
};

// 리뷰 평균 별점 계산
const calculateAverage = (reviews) => {
  if (!reviews.length) return 0;
  return reviews.reduce((sum, review) => sum + review.rating, 0) / reviews.length;
};

// 카카오맵 카테고리에서 상위 카테고리 제거
const extractCategory = (categoryString) => {
  if (!categoryString) return "";
  const parts = categoryString.split(" > ");
  return parts.length > 1 ? parts.slice(1).join(" > ") : parts[0];
};

// Haversine 공식으로 두 좌표 간 직선거리(m) 계산
const haversineMeters = (lat1, lon1, lat2, lon2) => {
  const R = 6371000;
  const toRad = (deg) => (deg * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
};

// 거리(m) 포맷 — 1km 미만은 m, 이상은 km
const formatDistance = (meters) => {
  if (meters < 1000) return `${Math.round(meters)}m`;
  return `${(meters / 1000).toFixed(1)}km`;
};

// 별점 표시 컴포넌트 (읽기 전용)
const Stars = ({rating, size = 18}) => {
  const fullStars = Math.floor(rating);
  const hasHalf = rating - fullStars >= 0.25 && rating - fullStars < 0.75;
  const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);

  const StarSvg = ({fill, svgKey, children}) => (
    React.createElement("svg", {key: svgKey, width: size, height: size, viewBox: "0 0 24 24", fill, stroke: "none"},
      children || React.createElement("path", {d: STAR_PATH})
    )
  );

  return React.createElement("span", {style: {display: "inline-flex", gap: 2, alignItems: "center"}}, [
    ...Array(fullStars).fill(0).map((_, i) =>
      StarSvg({fill: "var(--brand)", svgKey: "f" + i})
    ),
    hasHalf && React.createElement("svg", {key: "h", width: size, height: size, viewBox: "0 0 24 24"},
      React.createElement("defs", null,
        React.createElement("linearGradient", {id: "hs"},
          React.createElement("stop", {offset: "50%", stopColor: "var(--brand)"}),
          React.createElement("stop", {offset: "50%", stopColor: "var(--neutral-300)"})
        )
      ),
      React.createElement("path", {d: STAR_PATH, fill: "url(#hs)"})
    ),
    ...Array(emptyStars).fill(0).map((_, i) =>
      StarSvg({fill: "var(--neutral-300)", svgKey: "e" + i})
    ),
  ].filter(Boolean));
};

// URL 경로에서 현재 뷰 파싱 (예: /detail/123 → {view: "detail", id: "123"})
function parseRoute() {
  // pushState 경로 파싱
  const path = stripBasePath(window.location.pathname).replace(/^\//, "") || "";
  if (path.startsWith("detail/")) {
    const id = path.replace("detail/", "");
    return {view: "detail", id: id ? Number(id) : null};
  }
  if (path === "add") {
    return {view: "add", id: null};
  }
  // 기존 해시 라우팅 호환 (북마크/새로고침 대비)
  const hash = window.location.hash.replace("#/", "") || "";
  if (hash.startsWith("detail/")) {
    const id = hash.replace("detail/", "");
    return {view: "detail", id: id ? Number(id) : null};
  }
  if (hash === "add") {
    return {view: "add", id: null};
  }
  return {view: "list", id: null};
}

// 뷰 상태에 맞는 경로 생성
function buildPath(view, id) {
  if (view === "detail" && id) return withBasePath("/detail/" + id);
  if (view === "add") return withBasePath("/add");
  return withBasePath("/");
}

    });
    setReviewNickname("");
    setReviewRating(0);
    setReviewComment("");
  }, [selectedId]);

  // DDMC에서 각 맛집까지의 거리/도보 시간 계산 (주소 지오코딩)
  useEffect(() => {
    if (!kakaoReady || restaurants.length === 0) return;
    if (!window.kakao?.maps?.services?.Geocoder) return;
    const geocoder = new window.kakao.maps.services.Geocoder();

    restaurants.forEach((r) => {
      if (distances[r.id] || !r.address) return;
      geocoder.addressSearch(r.address, (result, status) => {
        if (status !== window.kakao.maps.services.Status.OK || !result[0]) return;
        const lng = parseFloat(result[0].x);
        const lat = parseFloat(result[0].y);
        if (Number.isNaN(lat) || Number.isNaN(lng)) return;
        const meters = haversineMeters(
          CENTER_COORDS.latitude,
          CENTER_COORDS.longitude,
          lat,
          lng
        );
        const minutes = Math.max(1, Math.ceil(meters / 67));
        setDistances((prev) =>
          prev[r.id] ? prev : { ...prev, [r.id]: { meters, minutes } }
        );
      });
    });
  }, [kakaoReady, restaurants]);

  // 초기 데이터 로드
  useEffect(() => {

        setError(null);

      setView(route.view);
      setSelectedId(route.id);

        setSearchQuery("");
        setSearchResults([]);
        setHasSearched(false);
        setPickedPlace(null);

      window.scrollTo({top: 0});

        setSearchQuery("");
        setSearchResults([]);
        setHasSearched(false);
        setPickedPlace(null);

      // URL 업데이트 (브라우저 히스토리에 기록, # 없이)
      const newPath = buildPath(destination, id);
      if (window.location.pathname !== newPath) {
        history.pushState(null, "", newPath);
      }
      window.scrollTo({top: 0, behavior: "smooth"});

    }

    if (query.trim().length < 2) {
      setSearchResults([]);
      setHasSearched(false);
      return;
    }

    searchTimer.current = setTimeout(async () => {
      setIsSearching(true);
      try {
        const results = await kakaoSearch(query.trim());
        setSearchResults(results);
        setHasSearched(true);

        console.error("Search error:", e);
        setSearchResults([]);
      } finally {
        setIsSearching(false);
      }

  const addPlace = useCallback(async () => {

      name: pickedPlace.place_name,
      address: pickedPlace.road_address_name || pickedPlace.address_name,
      category: extractCategory(pickedPlace.category_name),
      phone: pickedPlace.phone || "",
      mapLink: pickedPlace.place_url || "https://map.kakao.com"
    };

      setIsSubmittingPlace(true);

      setRestaurants(prev => [{id: row.id, ...newRestaurant, reviews: []}, ...prev]);
      navigateTo("detail", row.id);

      console.error("Failed to add restaurant:", e);
      if (e.message === "DUPLICATE_RESTAURANT") {
        alert("이미 등록된 맛집입니다.");
        return;
      }
      alert("맛집 등록에 실패했습니다. 다시 시도해주세요.");
    } finally {
      setIsSubmittingPlace(false);
    }

  // 리뷰 사진 추가 (초과분은 버림)
  const handleReviewPhotosSelect = useCallback((e) => {

    if (!files.length) return;
    setReviewPhotos((prev) => {
      const available = MAX_PHOTOS_PER_REVIEW - prev.length;
      if (available <= 0) return prev;
      const added = files
        .filter((f) => f.type.startsWith("image/"))
        .slice(0, available)
        .map((f) => ({ file: f, preview: URL.createObjectURL(f) }));
      return [...prev, ...added];
    });
    e.target.value = "";
  }, []);

      return next;

  }, []);

    if (!reviewNickname.trim() || !reviewRating || !reviewComment.trim()) return;
    if (isSubmittingReview) return;

    const newReview = {
      nickname: reviewNickname.trim(),
      rating: reviewRating,
      comment: reviewComment.trim()

    setIsSubmittingReview(true);
    let uploadedUrls = [];
    try {
      // 1. 사진 압축 + 업로드 (순차 — 실패 시 즉시 롤백)
      for (const p of reviewPhotos) {
        const blob = await compressImage(p.file);
        const url = await uploadReviewPhoto(blob);
        uploadedUrls.push(url);

      // 2. DB 리뷰 삽입
      const row = await addReviewToDB(selectedId, { ...newReview, photoUrls: uploadedUrls });

      // 3. 로컬 상태 반영
      setRestaurants(prev => prev.map(r =>

      ));

      reviewPhotos.forEach((p) => URL.revokeObjectURL(p.preview));
      setReviewPhotos([]);
      setReviewNickname("");
      setReviewRating(0);
      setReviewComment("");
    } catch (e) {
      console.error("Failed to add review:", e);

      await Promise.all(uploadedUrls.map(deleteReviewPhoto));
      const msg = String(e?.message || "");

        const parts = msg.split(":");

        const detail = parts.slice(2).join(":").trim() || "(응답 본문 없음)";

        alert("리뷰 등록에 실패했습니다. 다시 시도해주세요.");
      }

      setIsSubmittingReview(false);
    }

  }, [passwordInput, passwordModal, selectedId, navigateTo]);

  }, [restaurants]);

  // 이름/주소 검색 + 카테고리 필터

        if (top !== selectedCategory) return false;
      }
      if (query) {
        const haystack = `${normalizeText(r.name)} ${normalizeText(r.address)} ${normalizeText(r.category || "")}`;
        if (!haystack.includes(query)) return false;
      }
      return true;
    });
  }, [sortedRestaurants, listSearch, selectedCategory]);

  const resetFilters = useCallback(() => {

    return (
      <div style={{minHeight:"100vh",background:"var(--bg)"}}>
        <header style={{position:"sticky",top:0,zIndex:50,background:"var(--header-bg)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid var(--neutral-200)"}}>
          <div className="container-main" style={{maxWidth:960,margin:"0 auto",padding:"0 32px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:800,fontSize:22,color:"var(--neutral-900)"}}>맛집<span style={{color:"var(--brand)"}}>기록</span></div>
            <div className="skeleton" style={{width:112,height:36,borderRadius:"var(--radius-md)"}}/>
          </div>
        </header>
        <main className="container-main" style={{maxWidth:960,margin:"0 auto",padding:"0 32px"}}>
          <div style={{padding:"var(--space-2xl) 0 var(--space-xl)"}}>
            <div className="skeleton" style={{height:38,width:"60%",marginBottom:10}}/>
            <div className="skeleton" style={{height:38,width:"45%",marginBottom:16}}/>
            <div className="skeleton" style={{height:16,width:"55%"}}/>
          </div>
          <div style={{display:"flex",gap:12,marginBottom:"var(--space-lg)"}}>
            <div className="skeleton" style={{height:28,width:96,borderRadius:100}}/>
            <div className="skeleton" style={{height:28,width:96,borderRadius:100}}/>
          </div>
          <div className="responsive-grid" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:20}}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{background:"var(--surface)",borderRadius:"var(--radius-lg)",padding:"var(--space-lg)",boxShadow:"var(--shadow-sm)",border:"1px solid var(--neutral-200)",display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:12}}>
                  <div style={{flex:1}}>
                    <div className="skeleton" style={{height:20,width:"70%",marginBottom:8}}/>

        </main>

  if (error) {

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",transition:"background .3s"}}>

      {/* ═══ Header ═══ */}
      <header style={{position:"sticky",top:0,zIndex:50,background:"var(--header-bg)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid var(--neutral-200)",transition:"background .3s,border-color .3s"}}>
        <div className="container-main" style={{maxWidth:960,margin:"0 auto",padding:"0 32px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:800,fontSize:22,color:"var(--neutral-900)",cursor:"pointer"}} onClick={()=>navigateTo("list")}>맛집<span style={{color:"var(--brand)"}}>기록</span></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>

            {view!=="list"&&view!=="add"&&<button className="btn-primary" style={{padding:"10px 22px",fontSize:14}} onClick={()=>navigateTo("add")}>+ 맛집 등록</button>}

      <main className={`container-main ${isAnimating ? "page-exit" : "page-enter"}`} style={{maxWidth:960,margin:"0 auto",padding:"0 32px",paddingBottom:120}}>

        {view==="list"&&<div>
          <div style={{padding:"var(--space-2xl) 0 var(--space-xl)",opacity:mounted?1:0,transform:mounted?"translateY(0)":"translateY(20px)",transition:"all .6s cubic-bezier(.22,1,.36,1)"}}>
            <h1 className="hero-title" style={{fontSize:38,fontWeight:800,color:"var(--neutral-900)",lineHeight:1.25,marginBottom:12}}>회사 근처<br/><span style={{color:"var(--brand)"}}>맛집</span>을 함께 <span style={{color:"var(--brand)"}}>공유</span>하세요</h1>

                  {a>0&&<div style={{background:"var(--brand)",color:"var(--btn-fg)",borderRadius:"var(--radius-sm)",padding:"6px 10px",fontSize:16,fontWeight:800,minWidth:44,textAlign:"center"}}>{a.toFixed(1)}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><Stars rating={a} size={16}/><span style={{fontSize:13,color:"var(--neutral-400)",fontWeight:500}}>리뷰 {r.reviews.length}개</span></div>
                  <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="var(--neutral-300)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={CHEVRON_RIGHT_PATH}/></svg>
                </div>
              </div>
            )})}
          </div>}
        </div>}

        {/* ═══ DETAIL ═══ */}
        {view==="detail"&&selectedRestaurant&&<div>
          <div style={{padding:"var(--space-lg) 0 var(--space-md)"}}><BackButton onClick={() => navigateTo("list")}/></div>

          <div className="stagger-item" style={{...CARD_STYLE, marginBottom: "var(--space-xl)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
              <div style={{flex:1,minWidth:200}}>
                <h1 style={{fontSize:30,fontWeight:800,color:"var(--neutral-900)",lineHeight:1.2,marginBottom:8}}>{selectedRestaurant.name}</h1>
                {selectedRestaurant.category&&<span style={{...CATEGORY_TAG_STYLE, padding: "3px 10px", marginBottom: 10}}>{selectedRestaurant.category}</span>}
                <p style={{fontSize:15,color:"var(--neutral-500)",display:"flex",alignItems:"center",gap:6,marginBottom:8}}><Pin size={16} color="var(--neutral-400)"/>{selectedRestaurant.address}</p>
                {distances[selectedRestaurant.id]&&<p style={{fontSize:14,color:"var(--neutral-500)",display:"inline-flex",alignItems:"baseline",gap:6,marginBottom:12,fontWeight:500,lineHeight:1.2}}>
                  <svg width={14} height={14} viewBox="0 0 24 24" fill="var(--brand)" style={{alignSelf:"center"}}><path d={WALK_PATH}/></svg>
                  DDMC에서 도보 <strong style={{fontSize:18,fontWeight:800,color:"var(--neutral-900)",letterSpacing:"-.02em"}}>{distances[selectedRestaurant.id].minutes}분</strong>
                  <span style={{color:"var(--neutral-400)",fontSize:13}}>· {formatDistance(distances[selectedRestaurant.id].meters)}</span>
                </p>}
                {selectedRestaurant.phone&&<p style={{fontSize:14,color:"var(--neutral-500)",display:"flex",alignItems:"center",gap:6,marginBottom:16}}><svg width={15} height={15} viewBox="0 0 24 24" fill="var(--neutral-400)"><path d={PHONE_PATH}/></svg>{selectedRestaurant.phone}</p>}
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <a href={selectedRestaurant.mapLink} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:14,fontWeight:600,color:"var(--brand)",textDecoration:"none",padding:"8px 16px",borderRadius:"var(--radius-sm)",background:"var(--brand-bg)"}}><Pin size={15} color="var(--brand)"/>지도에서 보기</a>
                  <button className="btn-secondary" style={{...DELETE_BTN_STYLE, padding: "8px 14px", fontSize: 13, borderRadius: "var(--radius-sm)"}} onClick={deleteRestaurant}>맛집 삭제</button>
                </div>
              </div>
              <div style={{textAlign:"center",padding:"20px 28px",background:"var(--accent-grad)",borderRadius:"var(--radius-lg)"}}>
                <div style={{fontSize:42,fontWeight:800,color:"var(--brand)",lineHeight:1}}>{selectedRestaurant.reviews.length?calculateAverage(selectedRestaurant.reviews).toFixed(1):"—"}</div>
                <Stars rating={calculateAverage(selectedRestaurant.reviews)} size={18}/>
                <div style={{fontSize:13,color:"var(--neutral-500)",marginTop:6,fontWeight:500}}>리뷰 {selectedRestaurant.reviews.length}개</div>
              </div>
            </div>
          </div>

          {/* 리뷰 작성 */}
          <div className="stagger-item" style={{...REVIEW_SECTION_STYLE, animationDelay: ".1s"}}>
            <h2 style={{fontSize:18,fontWeight:700,color:"var(--neutral-900)",letterSpacing:"-.03em",marginBottom:"var(--space-lg)"}}>리뷰 작성하기</h2>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={LABEL_STYLE}>닉네임</label><input className="input-field" placeholder="닉네임을 입력하세요" value={reviewNickname} onChange={e => setReviewNickname(e.target.value)}/></div>
                <div><label style={LABEL_STYLE}>별점</label><div style={{paddingTop:8}}><StarInput value={reviewRating} onChange={setReviewRating}/></div></div>
              </div>
              <div><label style={LABEL_STYLE}>한줄평</label><input className="input-field" placeholder="이 맛집에 대한 한줄평을 남겨주세요" value={reviewComment} onChange={e => setReviewComment(e.target.value)}/></div>
              <div>
                <label style={LABEL_STYLE}>사진 <span style={{color:"var(--neutral-400)",fontWeight:500}}>(선택, 최대 {MAX_PHOTOS_PER_REVIEW}장)</span></label>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(96px, 1fr))",gap:8}}>
                  {reviewPhotos.map((p, i) => (
                    <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:"var(--radius-sm)",overflow:"hidden",background:"var(--neutral-100)",border:"1px solid var(--neutral-200)"}}>
                      <img src={p.preview} alt={`사진 ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <button type="button" onClick={() => removeReviewPhoto(i)} aria-label="사진 제거" style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,.65)",color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                        <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d={CLOSE_PATH}/></svg>
                      </button>
                    </div>
                  ))}
                  {reviewPhotos.length < MAX_PHOTOS_PER_REVIEW && (
                    <label style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",border:"1.5px dashed var(--neutral-300)",borderRadius:"var(--radius-sm)",color:"var(--neutral-500)",fontSize:12,fontWeight:500,transition:"border-color .2s, color .2s, background .2s"}} onMouseEnter={e => {e.currentTarget.style.borderColor = "var(--brand)"; e.currentTarget.style.color = "var(--brand)"; e.currentTarget.style.background = "var(--brand-bg)";}} onMouseLeave={e => {e.currentTarget.style.borderColor = "var(--neutral-300)"; e.currentTarget.style.color = "var(--neutral-500)"; e.currentTarget.style.background = "transparent";}}>
                      <input type="file" accept="image/*" multiple onChange={handleReviewPhotosSelect} style={{display:"none"}} disabled={isSubmittingReview}/>
                      <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={PLUS_PATH}/></svg>
                      <span>사진 추가</span>
                    </label>
                  )}
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"flex-end"}}><button className="btn-primary" disabled={!reviewNickname.trim() || !reviewRating || !reviewComment.trim() || isSubmittingReview} onClick={addReview}>{isSubmittingReview ? "등록 중..." : "리뷰 등록"}</button></div>
            </div>
          </div>

          {/* 리뷰 목록 */}
          <div className="stagger-item" style={{animationDelay:".2s"}}>
            <h2 style={{fontSize:18,fontWeight:700,color:"var(--neutral-900)",letterSpacing:"-.03em",marginBottom:"var(--space-lg)"}}>리뷰 {selectedRestaurant.reviews.length}개</h2>
            {selectedRestaurant.reviews.length===0?
              <div style={{background:"var(--surface)",borderRadius:"var(--radius-lg)",padding:"var(--space-2xl) var(--space-lg)",textAlign:"center",border:"1px dashed var(--neutral-200)"}}><div style={{fontSize:40,marginBottom:12}}>📝</div><p style={{fontSize:15,color:"var(--neutral-400)",fontWeight:500}}>아직 리뷰가 없어요</p><p style={{fontSize:13,color:"var(--neutral-300)",marginTop:4}}>첫 번째 리뷰를 남겨보세요!</p></div>
            :<div style={{display:"flex",flexDirection:"column",gap:12}}>
              {selectedRestaurant.reviews.map((rv,i)=><div key={rv.id} className="review-item" style={{animationDelay:`${i*.06}s`,background:"var(--surface)",borderRadius:"var(--radius-md)",padding:"var(--space-lg)",boxShadow:"var(--shadow-sm)",border:"1px solid var(--neutral-200)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:`hsl(${(rv.nickname.charCodeAt(0)*47)%360},50%,var(--av-bg))`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:`hsl(${(rv.nickname.charCodeAt(0)*47)%360},55%,var(--av-fg))`}}>{rv.nickname[0]}</div>
                    <div><div style={{fontSize:14,fontWeight:600,color:"var(--neutral-800)"}}>{rv.nickname}</div><div style={{fontSize:12,color:"var(--neutral-400)"}}>{rv.createdAt}</div></div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <Stars rating={rv.rating} size={14}/>
                    <button className="btn-secondary" style={{...DELETE_BTN_STYLE, padding: "6px 10px", fontSize: 12}} onClick={() => deleteReview(rv.id)}>삭제</button>
                  </div>
                </div>
                <p style={{fontSize:15,color:"var(--neutral-700)",lineHeight:1.6,letterSpacing:"-.02em"}}>{rv.comment}</p>
                {rv.photoUrls && rv.photoUrls.length > 0 && (
                  <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(3, rv.photoUrls.length)}, 1fr)`,gap:6,marginTop:12}}>
                    {rv.photoUrls.map((url, pi) => (
                      <img
                        key={pi}
                        src={url}
                        alt={`${rv.nickname}의 리뷰 사진 ${pi+1}`}
                        loading="lazy"
                        onClick={() => setLightbox({urls: rv.photoUrls, index: pi})}
                        style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:"var(--radius-sm)",cursor:"zoom-in",background:"var(--neutral-100)",display:"block",transition:"transform .2s"}}
                        onMouseEnter={e => e.currentTarget.style.transform = "scale(1.02)"}
                        onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
                      />
                    ))}
                  </div>
                )}
              </div>)}
            </div>}
          </div>
        </div>}

        {/* ═══ ADD ═══ */}
        {view==="add"&&<div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{padding:"var(--space-xl) 0 var(--space-lg)"}}><BackButton onClick={() => navigateTo("list")}/></div>

          <div className="stagger-item" style={CARD_STYLE}>
            <h1 style={{fontSize:26,fontWeight:800,color:"var(--neutral-900)",marginBottom:8}}>맛집 검색 & 등록</h1>
            <p style={{fontSize:14,color:"var(--neutral-400)",marginBottom:"var(--space-xl)",letterSpacing:"-.02em"}}>회사 근처 맛집만 등록 가능해요</p>

            <div style={{position:"relative",marginBottom: pickedPlace ? 20 : 0}}>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",color:"var(--neutral-400)",zIndex:1}}>
                  <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><circle {...SEARCH_CIRCLE}/><path d={SEARCH_LINE}/></svg>
                </div>
                <input className="input-field" style={{paddingLeft:44,fontSize:16}} placeholder="가게 이름이나 키워드를 입력하세요" value={searchQuery} onChange={e => handleSearch(e.target.value)} disabled={!kakaoReady}/>
                {isSearching &&<div style={{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)"}}><div style={{width:18,height:18,border:"2px solid var(--neutral-300)",borderTopColor:"var(--brand)",borderRadius:"50%",animation:"spin .6s linear infinite"}}/></div>}
              </div>

              {searchResults.length > 0 && !pickedPlace &&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,background:"var(--popover)",borderRadius:"0 0 var(--radius-md) var(--radius-md)",boxShadow:"var(--shadow-lg)",border:"1px solid var(--neutral-200)",borderTop:"none",maxHeight:360,overflowY:"auto"}}>
                {searchResults.map((p, i)=><div key={i} className="search-item" onClick={() => selectPlace(p)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:600,color:"var(--neutral-800)",letterSpacing:"-.02em",marginBottom:4}}>{p.place_name}</div>
                      <div style={{fontSize:13,color:"var(--neutral-500)",marginBottom:2}}>{p.road_address_name||p.address_name}</div>
                      {p.category_name&&<span style={{fontSize:11,color:"var(--brand)",fontWeight:500}}>{extractCategory(p.category_name)}</span>}
                    </div>
                    <div style={{flexShrink:0,width:28,height:28,borderRadius:"50%",border:"1.5px solid var(--neutral-200)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--neutral-400)"}}>
                      <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d={PLUS_PATH}/></svg>
                    </div>
                  </div>
                </div>)}
              </div>}

              {hasSearched && searchResults.length===0&&searchQuery.trim().length>=2&&!pickedPlace &&!isSearching &&
                <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,background:"var(--popover)",borderRadius:"0 0 var(--radius-md) var(--radius-md)",boxShadow:"var(--shadow-lg)",border:"1px solid var(--neutral-200)",borderTop:"none",padding:"24px 20px",textAlign:"center"}}>
                  <p style={{fontSize:14,color:"var(--neutral-400)"}}>검색 결과가 없어요</p><p style={{fontSize:13,color:"var(--neutral-300)",marginTop:4}}>다른 키워드로 검색해보세요</p>
                </div>}
            </div>

            {pickedPlace &&<div style={{background:"var(--accent-grad)",border:`1.5px solid var(--pick-bc)`,borderRadius:"var(--radius-lg)",padding:"20px 24px",animation:"fadeUp .3s ease forwards",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Pin size={20} color="var(--brand)"/><span style={{fontSize:18,fontWeight:700,color:"var(--neutral-900)",letterSpacing:"-.03em"}}>{pickedPlace.place_name}</span></div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,marginLeft:28}}>
                    <span style={{fontSize:14,color:"var(--neutral-600)"}}>{pickedPlace.road_address_name||pickedPlace.address_name}</span>
                    {pickedPlace.category_name&&<span style={{fontSize:13,color:"var(--brand)",fontWeight:500}}>{extractCategory(pickedPlace.category_name)}</span>}
                    {pickedPlace.phone&&<span style={{fontSize:13,color:"var(--neutral-500)"}}>📞 {pickedPlace.phone}</span>}
                  </div>
                  {pickedPlace.place_url&&<a href={pickedPlace.place_url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginLeft:28,marginTop:10,fontSize:13,color:"var(--brand-dark)",textDecoration:"none",fontWeight:500}}>지도에서 확인 →</a>}
                </div>
                <button onClick={()=>{setPickedPlace(null); setSearchQuery("")}} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"var(--neutral-400)"}}><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={CLOSE_PATH}/></svg></button>
              </div>
            </div>}

            {pickedPlace &&<div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
              <button className="btn-secondary" onClick={()=>{setPickedPlace(null); setSearchQuery("")}}>다시 검색</button>
              <button className="btn-primary" onClick={addPlace} disabled={isPickedPlaceDuplicate || isSubmittingPlace}>{isSubmittingPlace ? "등록 중..." : "이 맛집 등록하기"}</button>
            </div>}

            {pickedPlace && isPickedPlaceDuplicate &&
              <p style={{marginTop:10,fontSize:13,color:"var(--del-c)",textAlign:"right"}}>이미 등록된 가게라 추가할 수 없어요.</p>
            }

            {!pickedPlace &&!hasSearched && searchQuery.length===0&&<div style={{marginTop:32,padding:"28px 24px",background:"var(--neutral-50)",borderRadius:"var(--radius-lg)",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔍</div>
              <p style={{fontSize:15,color:"var(--neutral-500)",fontWeight:500,marginBottom:6}}>가게 이름으로 검색해보세요</p>
              <p style={{fontSize:13,color:"var(--neutral-400)",lineHeight:1.6}}>맛집 이름을 입력하면<br/>주소와 상세정보를 자동으로 가져옵니다</p>
            </div>}
          </div>
        </div>}
      </main>

      <PasswordModal
        show={passwordModal.show}
        type={passwordModal.type}
        password={passwordInput}
        setPassword={setPasswordInput}
        onConfirm={handlePasswordConfirm}
        onCancel={handlePasswordCancel}
      />

      <Lightbox
        state={lightbox}
        onClose={() => setLightbox(null)}
        onNav={(dir) => setLightbox(prev => prev ? { ...prev, index: (prev.index + dir + prev.urls.length) % prev.urls.length } : prev)}
      />

      {view==="list"&&<button className="fab" onClick={()=>navigateTo("add")} aria-label="맛집 등록">
        <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"><path d={PLUS_PATH}/></svg>
        <span className="fab-label">맛집 등록</span>
      </button>}

      <footer style={{textAlign:"center",padding:"var(--space-xl) var(--space-lg)",borderTop:"1px solid var(--neutral-200)",fontSize:13,color:"var(--neutral-400)",transition:"border-color .3s,color .3s"}}>맛집기록 — 우리 회사 맛집 리뷰</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
